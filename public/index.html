<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CC</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#5b8def" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CC" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="icon" id="favicon" href="/icon-192.png" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e6e8ec;
    --muted: #8a92a3;
    --accent: #5b8def;
    --accent-dark: #3f6fd6;
    --bubble-me: #2b5fd9;
    --bubble-other: #232733;
    --system: #6b7280;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  #login {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #login .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    text-align: center;
  }
  #login h1 { margin: 0 0 8px; font-size: 20px; }
  #login p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0f1115;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    padding: 10px 16px;
    transition: background .15s;
  }
  button:hover { background: var(--accent-dark); }
  #login button { width: 100%; margin-top: 12px; }

  #app {
    display: none;
    height: 100%;
    max-width: 1140px;
    margin: 0 auto;
    overflow: hidden;
    grid-template-columns: 200px 1fr 220px;
    border: 3px solid transparent;
    box-sizing: border-box;
  }
  #app.active { display: grid; }

  /* 整个窗口的@提醒：先闪几下，再"定住"停留在提醒态，直到用户点一下才恢复 */
  @keyframes window-mention-flash {
    0%, 100% { border-color: transparent; background-color: transparent; }
    50% { border-color: #f0a94e; background-color: rgba(240, 169, 78, 0.08); }
  }
  #app.window-flashing {
    animation: window-mention-flash 0.5s ease-in-out 4;
  }
  #app.window-settled {
    border-color: #f0a94e;
    box-shadow: 0 0 0 2px rgba(240, 169, 78, 0.35) inset;
  }

  #chat-col { display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-width: 0; min-height: 0; overflow: hidden; position: relative; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h2 { margin: 0; font-size: 16px; }
  header .status { font-size: 12px; color: var(--muted); }
  .header-left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .my-username {
    font-size: 20px;
    font-weight: 700;
    color: #f0a94e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  #messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { display: flex; flex-direction: column; max-width: 70%; }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }
  .msg .name { font-size: 11px; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }
  .msg .bubble {
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.me .bubble { background: var(--bubble-me); color: white; border-bottom-right-radius: 4px; }
  .msg.other .bubble { background: var(--bubble-other); color: var(--text); border-bottom-left-radius: 4px; }
  .msg .bubble a { color: inherit; text-decoration: underline; word-break: break-all; }
  .msg.other .bubble a { color: #8ab4f8; }
  .msg .time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
  .system-msg { text-align: center; color: var(--system); font-size: 12px; margin: 6px 0; }
  #typing { font-size: 12px; color: var(--muted); min-height: 16px; padding: 0 18px; }

  /* 置顶公告 */
  #pinned-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: #1c2233;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  #pinned-bar .pin-icon { flex-shrink: 0; }
  #pinned-bar .pin-text { flex: 1; color: var(--text); word-break: break-word; white-space: pre-wrap; }
  #pinned-bar .pin-text.empty { color: var(--muted); font-style: italic; }
  #pinned-bar .pin-edit-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 8px;
  }
  #pinned-bar .pin-edit-btn:hover { color: var(--text); border-color: var(--accent); background: transparent; }
  #pinned-edit-row {
    display: none;
    gap: 8px;
    padding: 10px 18px;
    background: #1c2233;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  #pinned-edit-row.active { display: flex; }
  #pinned-edit-row #pinned-input {
    flex: 1;
    min-width: 160px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    line-height: 1.4;
    max-height: 100px;
    overflow-y: auto;
  }
  #pinned-edit-row #pinned-password-input { width: 110px; flex: 0 0 auto; font-size: 13px; }
  #pinned-edit-row button { font-size: 12px; padding: 8px 12px; }
  #pin-error-msg {
    width: 100%;
    font-size: 12px;
    color: #e5534b;
    display: none;
  }
  #pin-error-msg.active { display: block; }

  /* @ 提及高亮 */
  .mention { color: var(--accent); font-weight: 600; }
  .msg.mentioned-me .bubble { outline: 2px solid #f0a94e; outline-offset: 1px; }

  @keyframes mention-flash {
    0%   { box-shadow: 0 0 0 0 rgba(240, 169, 78, 0.9); background-color: rgba(240, 169, 78, 0.35); }
    60%  { box-shadow: 0 0 0 14px rgba(240, 169, 78, 0); background-color: rgba(240, 169, 78, 0.35); }
    100% { box-shadow: 0 0 0 0 rgba(240, 169, 78, 0); background-color: transparent; }
  }
  .msg.mentioned-me.flash .bubble {
    animation: mention-flash 0.9s ease-out 3;
  }

  /* @所有人 全屏醒目提示 */
  #announce-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 12, 18, 0.72);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #announce-overlay.active {
    display: flex;
    animation: announce-fade-in 0.2s ease;
  }
  @keyframes announce-fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  #announce-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 26px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: scale(0.85) translateY(10px);
    animation: announce-pop 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes announce-pop {
    to { transform: scale(1) translateY(0); }
  }
  #announce-card .announce-icon { font-size: 40px; margin-bottom: 6px; }
  #announce-card .announce-label {
    font-size: 13px;
    font-weight: 700;
    color: #f0a94e;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  #announce-card .announce-from {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  #announce-card .announce-text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 24px;
    max-height: 40vh;
    overflow-y: auto;
    text-align: left;
    padding: 0 4px;
  }
  #announce-close-btn {
    background: #f0a94e;
    color: #1a1a1a;
    font-weight: 700;
    border: none;
    padding: 11px 40px;
    border-radius: 8px;
    font-size: 14px;
  }
  #announce-close-btn:hover { background: #e6994a; }

  /* @ 自动补全下拉 */
  #mention-menu {
    display: none;
    position: absolute;
    bottom: 56px;
    left: 16px;
    right: 16px;
    max-height: 160px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    z-index: 10;
  }
  #mention-menu.active { display: block; }
  #mention-menu .mention-item {
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #mention-menu .mention-item:hover,
  #mention-menu .mention-item.active { background: var(--bubble-other); }

  #input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  #input-row { align-items: flex-end; }
  #input-row textarea {
    flex: 1;
    resize: none;
    font-family: inherit;
    line-height: 1.4;
    max-height: 120px;
    overflow-y: auto;
  }
  #input-row button#send-btn { flex-shrink: 0; }
  #input-row button#image-pick-btn { flex-shrink: 0; align-self: flex-end; }

  /* 引用回复 */
  .msg .reply-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 11px;
    padding: 2px 4px;
    cursor: pointer;
  }
  .msg .reply-btn:hover { color: var(--accent); background: transparent; }
  .msg .meta-row { display: flex; align-items: center; gap: 6px; }
  .msg.me .meta-row { flex-direction: row-reverse; }

  /* 消息表情回应（点赞/疑问）—— 卡通胶囊风格 */
  .msg .reaction-btn {
    background: var(--bubble-other);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 11px 4px 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .msg .reaction-btn .reaction-icon {
    font-size: 19px;
    line-height: 1;
    transform-origin: center;
  }
  .msg .reaction-btn:hover {
    transform: scale(1.12);
    border-color: var(--accent);
    background: var(--bubble-other);
  }
  .msg .reaction-btn:active { transform: scale(0.92); }
  .msg .reaction-btn.reacted {
    color: #f0a94e;
    background: rgba(240, 169, 78, 0.16);
    border-color: #f0a94e;
  }
  .msg .reaction-btn .reaction-count { min-width: 8px; }

  @keyframes reaction-pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.5) rotate(-8deg); }
    70%  { transform: scale(0.9) rotate(4deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .msg .reaction-btn.pop .reaction-icon {
    animation: reaction-pop 0.45s ease;
  }

  .quote-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 10px;
    margin-bottom: 4px;
    border-left: 3px solid var(--accent);
    background: rgba(91, 141, 239, 0.1);
    border-radius: 4px;
    font-size: 12px;
    max-width: 100%;
  }
  .quote-block .quote-name { color: var(--accent); font-weight: 600; }
  .quote-block .quote-text {
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #reply-preview-bar {
    display: none;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    background: #1c2233;
    border-top: 1px solid var(--border);
  }
  #reply-preview-bar.active { display: flex; }
  #reply-preview-bar .quote-block { flex: 1; margin-bottom: 0; }
  #reply-preview-bar .reply-cancel-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
  }
  #reply-preview-bar .reply-cancel-btn:hover { color: var(--text); background: transparent; }

  /* 图片预览条 */
  #image-preview-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1c2233;
    border-top: 1px solid var(--border);
  }
  #image-preview-bar.active { display: flex; }
  #image-preview-bar img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  #image-preview-status { flex: 1; font-size: 12px; color: var(--muted); }

  /* 图片上传按钮 */
  #image-pick-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    padding: 0 12px;
  }
  #image-pick-btn:hover { color: var(--text); border-color: var(--accent); background: transparent; }

  /* 消息里的图片 */
  .msg .bubble .msg-image {
    max-width: 220px;
    max-height: 220px;
    border-radius: 10px;
    cursor: pointer;
    display: block;
  }
  .msg .bubble .msg-image + div { margin-top: 6px; }

  #sidebar { padding: 16px; overflow-y: auto; min-height: 0; }
  #sidebar h3 { font-size: 13px; color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  #online-list { list-style: none; margin: 0; padding: 0; font-size: 14px; }
  #online-list li { padding: 6px 0; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3ddc84; flex-shrink: 0; }
  .mention-all-icon { font-size: 12px; flex-shrink: 0; }

  /* 常用文本栏 */
  #quick-sidebar { padding: 16px; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; }
  #quick-sidebar h3 { font-size: 13px; color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  .quick-category-list .quick-text-btn {
    flex: 1;
    text-align: left;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.4;
  }
  .quick-category-list .quick-text-btn:hover { border-color: var(--accent); background: transparent; color: var(--accent); }
  .quick-category-list .quick-del-btn {
    flex-shrink: 0;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 4px 6px;
    font-size: 14px;
    line-height: 1;
  }
  .quick-category-list .quick-del-btn:hover { color: var(--danger, #e5534b); background: transparent; }

  /* 常用文本分类（二级菜单） */
  #quick-categories { flex: 1; overflow-y: auto; margin-bottom: 10px; }
  .quick-category { margin-bottom: 8px; }
  .quick-category-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .quick-category-header:hover { border-color: var(--accent); background: transparent; }
  .quick-category-header .quick-category-count { color: var(--muted); font-weight: 400; margin-left: 4px; }
  .quick-category-header .quick-category-arrow { transition: transform 0.15s; color: var(--muted); }
  .quick-category.expanded .quick-category-header .quick-category-arrow { transform: rotate(90deg); }
  .quick-category-list {
    list-style: none;
    margin: 6px 0 0;
    padding: 0 0 0 4px;
    display: none;
  }
  .quick-category-list li {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 6px;
  }
  .quick-category.expanded .quick-category-list { display: block; }
  .quick-category-empty {
    display: none;
    color: var(--muted);
    font-size: 12px;
    padding: 6px 4px;
    font-style: italic;
  }
  .quick-category.expanded .quick-category-empty.active { display: block; }

  #quick-add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 13px;
    padding: 8px;
  }
  #quick-add-btn:hover { color: var(--text); border-color: var(--accent); background: transparent; }
  #quick-add-row { display: none; flex-direction: column; gap: 6px; margin-top: 8px; }
  #quick-add-row.active { display: flex; }
  #quick-add-row input { font-size: 13px; padding: 8px 10px; }
  #quick-add-row .quick-add-actions { display: flex; gap: 6px; }
  #quick-add-row .quick-add-actions button { flex: 1; font-size: 12px; padding: 6px; margin-top: 0; }
  #quick-add-row .quick-cancel-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  #quick-add-row .quick-cancel-btn:hover { color: var(--text); border-color: var(--accent); background: transparent; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    #quick-sidebar { display: none; }
    #app { grid-template-columns: 200px 1fr; }
  }
  @media (max-width: 640px) {
    #app { grid-template-columns: 1fr; }
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>💬 CC</h1>
    <p>输入昵称加入聊天</p>
    <input id="username-input" type="text" placeholder="你的昵称" maxlength="20" />
    <button id="join-btn">加入 CC</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <h3>在线用户 (<span id="online-count">0</span>)</h3>
    <ul id="online-list"></ul>
  </div>
  <div id="chat-col">
    <header>
      <div class="header-left">
        <span class="my-username" id="my-username"></span>
        <h2>💬 CC</h2>
      </div>
      <span class="status" id="conn-status">连接中...</span>
    </header>
    <div id="pinned-bar">
      <span class="pin-icon">📌</span>
      <span class="pin-text" id="pinned-text"></span>
      <button class="pin-edit-btn" id="pin-edit-open-btn">编辑</button>
    </div>
    <div id="pinned-edit-row">
      <textarea id="pinned-input" placeholder="设置置顶公告，留空则清除...（Shift+Enter换行）" maxlength="600" rows="1"></textarea>
      <input id="pinned-password-input" type="password" placeholder="编辑密码" autocomplete="off" />
      <button id="pin-save-btn">保存</button>
      <button class="pin-edit-btn" id="pin-cancel-btn">取消</button>
      <span id="pin-error-msg"></span>
    </div>
    <div id="messages"></div>
    <div id="typing"></div>
    <div id="mention-menu"></div>
    <div id="reply-preview-bar">
      <div class="quote-block">
        <span class="quote-name" id="reply-preview-name"></span>
        <span class="quote-text" id="reply-preview-text"></span>
      </div>
      <button class="reply-cancel-btn" id="reply-cancel-btn">✕</button>
    </div>
    <div id="image-preview-bar">
      <img id="image-preview-thumb" alt="预览图" />
      <span id="image-preview-status">已选择图片</span>
      <button class="reply-cancel-btn" id="image-cancel-btn">✕</button>
    </div>
    <div id="input-row">
      <button id="image-pick-btn" type="button" title="发送图片">🖼️</button>
      <input id="image-file-input" type="file" accept="image/*" style="display:none" />
      <textarea id="text-input" placeholder="输入消息，输入 @ 可提醒某人，Enter 发送，Shift+Enter 换行..." maxlength="2000" rows="1" autocomplete="off"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>
  <div id="quick-sidebar">
    <h3>常用文本</h3>
    <div id="quick-categories"></div>
    <button id="quick-add-btn">+ 添加常用语</button>
    <div id="quick-add-row">
      <input id="quick-add-input" type="text" placeholder="输入常用语内容...（含&quot;代拍/代购/煤炉&quot;会自动归类）" maxlength="200" />
      <div class="quick-add-actions">
        <button id="quick-save-btn">保存</button>
        <button class="quick-cancel-btn" id="quick-cancel-btn">取消</button>
      </div>
    </div>
  </div>
</div>

<div id="announce-overlay">
  <div id="announce-card">
    <div class="announce-icon">📢</div>
    <div class="announce-label">所有人</div>
    <div class="announce-from" id="announce-from"></div>
    <div class="announce-text" id="announce-text"></div>
    <button id="announce-close-btn">知道了</button>
  </div>
</div>

<script>
  let ws = null;
  let username = '';
  let typingTimeout = null;

  const loginEl = document.getElementById('login');
  const appEl = document.getElementById('app');
  const faviconEl = document.getElementById('favicon');
  const usernameInput = document.getElementById('username-input');
  const joinBtn = document.getElementById('join-btn');
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const connStatus = document.getElementById('conn-status');
  const myUsernameEl = document.getElementById('my-username');
  const announceOverlay = document.getElementById('announce-overlay');
  const announceFromEl = document.getElementById('announce-from');
  const announceTextEl = document.getElementById('announce-text');
  const announceCloseBtn = document.getElementById('announce-close-btn');
  const onlineList = document.getElementById('online-list');
  const onlineCount = document.getElementById('online-count');
  const typingEl = document.getElementById('typing');
  const pinnedTextEl = document.getElementById('pinned-text');
  const pinEditOpenBtn = document.getElementById('pin-edit-open-btn');
  const pinnedEditRow = document.getElementById('pinned-edit-row');
  const pinnedInput = document.getElementById('pinned-input');
  const pinnedPasswordInput = document.getElementById('pinned-password-input');
  const pinErrorMsg = document.getElementById('pin-error-msg');
  const pinSaveBtn = document.getElementById('pin-save-btn');
  const pinCancelBtn = document.getElementById('pin-cancel-btn');
  const mentionMenu = document.getElementById('mention-menu');
  const quickCategoriesEl = document.getElementById('quick-categories');
  const quickAddBtn = document.getElementById('quick-add-btn');
  const quickAddRow = document.getElementById('quick-add-row');
  const quickAddInput = document.getElementById('quick-add-input');
  const quickSaveBtn = document.getElementById('quick-save-btn');
  const quickCancelBtn = document.getElementById('quick-cancel-btn');
  const replyPreviewBar = document.getElementById('reply-preview-bar');
  const replyPreviewName = document.getElementById('reply-preview-name');
  const replyPreviewText = document.getElementById('reply-preview-text');
  const replyCancelBtn = document.getElementById('reply-cancel-btn');
  const imagePreviewBar = document.getElementById('image-preview-bar');
  const imagePreviewThumb = document.getElementById('image-preview-thumb');
  const imagePreviewStatus = document.getElementById('image-preview-status');
  const imageCancelBtn = document.getElementById('image-cancel-btn');
  const imagePickBtn = document.getElementById('image-pick-btn');
  const imageFileInput = document.getElementById('image-file-input');

  let onlineUsers = [];
  let currentPinnedText = '';
  const originalTitle = document.title;
  let titleFlashTimer = null;
  let audioCtx = null;
  let replyingTo = null; // { username, text }
  let pendingImageUrl = null; // 上传成功后的图片URL，发送消息时带上
  let pendingImageObjectUrl = null; // 本地预览用的blob URL，发送/取消后要释放掉
  const MAX_IMAGE_SIZE = 8 * 1024 * 1024; // 跟服务端限制保持一致：8MB
  const ALLOWED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

  const QUICK_STORAGE_KEY = 'chatQuickPhrases';
  const REACTION_EMOJIS = ['👍', '❓'];
  const DEFAULT_QUICK_PHRASES = [
    '代拍 运费到付 运单号：',
    '煤炉运费更新 ID  运单号',
    '代购订单ID：帮忙确认下工单内容',
    '代拍ID：18禁',
    '代拍运费或者手续费变更，ID：',
    '代拍运费和手续变更 ID：',
  ];

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      connStatus.textContent = '已连接';
      ws.send(JSON.stringify({ type: 'join', username }));
    };

    ws.onclose = () => {
      connStatus.textContent = '连接已断开，正在重连...';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => { connStatus.textContent = '连接错误'; };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'history') {
        messagesEl.innerHTML = '';
        data.messages.forEach((m) => renderMessage(m, { live: false }));
        scrollToBottom();
      } else if (data.type === 'message') {
        renderMessage(data, { live: true });
        scrollToBottom();
        notifyIfMentioned(data);
        maybeShowAnnounceOverlay(data);
      } else if (data.type === 'system') {
        renderMessage(data, { live: true });
        scrollToBottom();
      } else if (data.type === 'online') {
        renderOnlineList(data.users);
      } else if (data.type === 'pinned') {
        setPinnedText(data.text || '');
        // 保存成功了（不管是不是自己改的），把编辑框关掉、密码框清空、错误提示清掉
        closePinEdit();
      } else if (data.type === 'pin_error') {
        pinErrorMsg.textContent = data.message || '密码错误';
        pinErrorMsg.classList.add('active');
        pinnedPasswordInput.focus();
      } else if (data.type === 'reaction_update') {
        const targetWrap = messagesEl.querySelector(`[data-message-id="${data.messageId}"]`);
        if (targetWrap) {
          const reactionBtn = Array.from(targetWrap.querySelectorAll('.reaction-btn'))
            .find((btn) => btn.dataset.emoji === data.emoji);
          if (reactionBtn) applyLiveReactionUpdate(reactionBtn, Array.isArray(data.users) ? data.users : []);
        }
      } else if (data.type === 'typing') {
        typingEl.textContent = `${data.username} 正在输入...`;
        clearTimeout(typingEl._t);
        typingEl._t = setTimeout(() => { typingEl.textContent = ''; }, 1500);
      }
    };
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function linkifyUrls(html) {
    // 只排除中文全角标点和中英文引号/括号，英文的 ? ! . 等在URL里很常见（比如查询参数），不能排除
    return html.replace(/(https?:\/\/[^\s，、。！？"'“”‘’（）()\[\]【】《》<>]+)/g, (rawUrl) => {
      let url = rawUrl;
      let trailing = '';
      // 保险起见，链接末尾如果还挂着标点（比如英文句号紧跟在域名后面）再摘一次
      const trailingCharsRe = /[.,;:!?]$/;
      while (url.length > 0 && trailingCharsRe.test(url)) {
        trailing = url.slice(-1) + trailing;
        url = url.slice(0, -1);
      }
      if (!url) return rawUrl;
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>${trailing}`;
    });
  }

  function renderTextWithMentions(text) {
    const escaped = escapeHtml(text);
    // 高亮 @用户名（用户名后需跟空白/标点/结尾）
    const withMentions = escaped.replace(/@([^\s，,。.!！?？@]{1,20})(?=\s|[，,。.!！?？]|$)/g, (match, name) => {
      return `<span class="mention">@${name}</span>`;
    });
    // 把消息里的 http(s) 链接转成可点击、新标签页打开的链接
    return linkifyUrls(withMentions);
  }

  function renderMessage(data, opts) {
    const isLive = !!(opts && opts.live);
    if (data.type === 'system') {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = data.text;
      messagesEl.appendChild(div);
      return;
    }
    const wrap = document.createElement('div');
    const isMe = data.username === username;
    const iAmQuoted = !!(data.quote && data.quote.username === username);
    const iAmMentioned = (Array.isArray(data.mentions) && data.mentions.includes(username) || iAmQuoted) && !isMe;
    wrap.className = 'msg ' + (isMe ? 'me' : 'other') + (iAmMentioned ? ' mentioned-me' : '') + (iAmMentioned && isLive ? ' flash' : '');
    if (typeof data.id === 'number') wrap.dataset.messageId = String(data.id);

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = data.username;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (data.quote) {
      const quoteBlock = document.createElement('div');
      quoteBlock.className = 'quote-block';
      const qName = document.createElement('span');
      qName.className = 'quote-name';
      qName.textContent = data.quote.username;
      const qText = document.createElement('span');
      qText.className = 'quote-text';
      qText.textContent = data.quote.text;
      quoteBlock.appendChild(qName);
      quoteBlock.appendChild(qText);
      bubble.appendChild(quoteBlock);
    }

    if (data.image) {
      const imgLink = document.createElement('a');
      imgLink.href = data.image;
      imgLink.target = '_blank';
      imgLink.rel = 'noopener noreferrer';
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = data.image;
      img.alt = '图片消息';
      img.loading = 'lazy';
      imgLink.appendChild(img);
      bubble.appendChild(imgLink);
    }

    if (data.text && data.text.trim()) {
      const textSpan = document.createElement('div');
      textSpan.innerHTML = renderTextWithMentions(data.text);
      bubble.appendChild(textSpan);
    }

    const metaRow = document.createElement('div');
    metaRow.className = 'meta-row';

    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = new Date(data.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    const replyBtn = document.createElement('button');
    replyBtn.className = 'reply-btn';
    replyBtn.textContent = '↩ 回复';
    replyBtn.addEventListener('click', () => {
      const replyText = (data.text && data.text.trim()) ? data.text : (data.image ? '[图片]' : '');
      startReply(data.username, replyText);
    });

    metaRow.appendChild(time);
    metaRow.appendChild(replyBtn);

    if (typeof data.id === 'number') {
      const reactions = data.reactions && typeof data.reactions === 'object' ? data.reactions : {};
      REACTION_EMOJIS.forEach((emoji) => {
        const reactionBtn = document.createElement('button');
        reactionBtn.className = 'reaction-btn';
        reactionBtn.dataset.emoji = emoji;
        reactionBtn.innerHTML = `<span class="reaction-icon">${emoji}</span><span class="reaction-count"></span>`;
        reactionBtn.addEventListener('click', () => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'reaction', messageId: data.id, emoji }));
          }
        });
        updateReactionButton(reactionBtn, Array.isArray(reactions[emoji]) ? reactions[emoji] : []);
        metaRow.appendChild(reactionBtn);
      });
    }

    wrap.appendChild(name);
    wrap.appendChild(bubble);
    wrap.appendChild(metaRow);
    messagesEl.appendChild(wrap);
  }

  function updateReactionButton(reactionBtn, users) {
    const count = users.length;
    const iReacted = users.includes(username);
    const emoji = reactionBtn.dataset.emoji;
    const label = emoji === '👍' ? '点赞' : '疑问';
    reactionBtn.classList.toggle('reacted', iReacted);
    reactionBtn.querySelector('.reaction-count').textContent = count > 0 ? String(count) : '';
    reactionBtn.title = count > 0 ? `${users.join('、')} ${label === '点赞' ? '点了赞' : '表示疑问'}` : label;
    reactionBtn.dataset.prevCount = String(count);
  }

  // 收到实时的表情回应更新（不是初始渲染/历史加载）时调用，会带一个卡通弹跳动画
  function applyLiveReactionUpdate(reactionBtn, users) {
    const prevCount = Number(reactionBtn.dataset.prevCount || 0);
    updateReactionButton(reactionBtn, users);
    if (users.length !== prevCount) {
      reactionBtn.classList.remove('pop');
      void reactionBtn.offsetWidth; // 强制重排，确保能重新触发动画
      reactionBtn.classList.add('pop');
    }
  }

  function startReply(replyUsername, replyText) {
    replyingTo = { username: replyUsername, text: replyText };
    replyPreviewName.textContent = replyUsername;
    replyPreviewText.textContent = replyText;
    replyPreviewBar.classList.add('active');
    textInput.focus();
  }

  function cancelReply() {
    replyingTo = null;
    replyPreviewBar.classList.remove('active');
  }

  replyCancelBtn.addEventListener('click', cancelReply);

  // ===== 图片发送 =====
  function resetImagePreview() {
    pendingImageUrl = null;
    if (pendingImageObjectUrl) {
      URL.revokeObjectURL(pendingImageObjectUrl);
      pendingImageObjectUrl = null;
    }
    imagePreviewBar.classList.remove('active');
    imagePreviewThumb.src = '';
    imageFileInput.value = '';
  }

  async function handleImageFile(file) {
    if (!file) return;
    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      alert('只支持 jpg / png / gif / webp 格式的图片');
      return;
    }
    if (file.size > MAX_IMAGE_SIZE) {
      alert('图片太大了，最大支持 8MB');
      return;
    }

    pendingImageObjectUrl = URL.createObjectURL(file);
    imagePreviewThumb.src = pendingImageObjectUrl;
    imagePreviewStatus.textContent = '上传中...';
    imagePreviewBar.classList.add('active');
    pendingImageUrl = null;

    try {
      const formData = new FormData();
      formData.append('image', file);
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '上传失败');
      pendingImageUrl = data.url;
      imagePreviewStatus.textContent = '图片已就绪，回车/点发送 一起发出去';
    } catch (e) {
      imagePreviewStatus.textContent = `上传失败：${e.message}`;
      pendingImageUrl = null;
    }
  }

  imagePickBtn.addEventListener('click', () => imageFileInput.click());
  imageFileInput.addEventListener('change', () => {
    const file = imageFileInput.files && imageFileInput.files[0];
    if (file) handleImageFile(file);
  });
  imageCancelBtn.addEventListener('click', resetImagePreview);

  // 支持直接在输入框粘贴剪贴板里的图片（截图工具复制的图很常见这么用）
  textInput.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type && item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) {
          e.preventDefault();
          handleImageFile(file);
        }
        break;
      }
    }
  });

  function playMentionSound() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      // 两个音符的"叮咚"提示音，音量调大一些，确保能被注意到
      [[880, now], [1160, now + 0.16]].forEach(([freq, startAt]) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(0.55, startAt + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startAt);
        osc.stop(startAt + 0.42);
      });
    } catch (e) {
      // 静默失败（比如浏览器阻止了自动播放），不影响其他功能
    }
  }

  // 发一条系统级桌面通知——不依赖页面是否可见/是否被最小化，浏览器窗口最小化时也能弹出
  function showDesktopNotification(title, body) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      const notif = new Notification(title, {
        body,
        icon: '/icon-192.png',
        tag: 'chat-app-notify', // 同一个tag会替换掉上一条，避免堆积一堆通知
      });
      notif.onclick = () => {
        window.focus();
        notif.close();
      };
    } catch (e) {
      // 少数环境（比如部分手机浏览器）不支持从页面直接new Notification，静默忽略
    }
  }

  function notifyIfMentioned(data) {
    if (data.username === username) return; // 自己发的消息不用提醒自己
    const iAmMentionedInText = Array.isArray(data.mentions) && data.mentions.includes(username);
    const iAmQuoted = !!(data.quote && data.quote.username === username);
    if (!iAmMentionedInText && !iAmQuoted) return;

    playMentionSound();
    triggerWindowMentionFlash();
    // 标签页标题闪烁提醒（被@和被引用回复用不同的文案，方便区分是哪种情况）
    const flashLabel = iAmMentionedInText ? '💬 有人@你了' : '💬 有人回复了你';
    // @所有人的系统通知统一交给 maybeShowAnnounceOverlay 那边发一次就够了，这里跳过避免弹两条重复通知
    if (!data.mentionsAll) {
      showDesktopNotification(
        iAmMentionedInText ? `${data.username} @了你` : `${data.username} 回复了你`,
        data.text || (data.image ? '[图片]' : '')
      );
    }
    if (document.hidden) {
      clearInterval(titleFlashTimer);
      let toggled = false;
      titleFlashTimer = setInterval(() => {
        document.title = toggled ? originalTitle : flashLabel;
        toggled = !toggled;
      }, 1000);
      document.addEventListener('visibilitychange', function onVisible() {
        if (!document.hidden) {
          clearInterval(titleFlashTimer);
          document.title = originalTitle;
          document.removeEventListener('visibilitychange', onVisible);
        }
      });
    }
  }

  // @所有人：全屏醒目弹窗，内容就是那条消息本身，点"知道了"才关闭
  function maybeShowAnnounceOverlay(data) {
    if (!data.mentionsAll) return;
    if (data.username === username) return; // 自己发的@所有人不用弹给自己看
    if (!Array.isArray(data.mentions) || !data.mentions.includes(username)) return;

    announceFromEl.textContent = `来自 ${data.username}`;
    announceTextEl.textContent = data.text || (data.image ? '[图片]' : '');
    announceOverlay.classList.add('active');
    showDesktopNotification(`📢 ${data.username} @所有人`, data.text || (data.image ? '[图片]' : ''));
  }

  function closeAnnounceOverlay() {
    announceOverlay.classList.remove('active');
  }
  announceCloseBtn.addEventListener('click', closeAnnounceOverlay);
  announceOverlay.addEventListener('click', (e) => {
    if (e.target === announceOverlay) closeAnnounceOverlay(); // 点背景空白处也能关
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && announceOverlay.classList.contains('active')) closeAnnounceOverlay();
  });

  // 整个窗口的@提醒：先闪几下，闪完"定住"停留在提醒态（橙色边框常亮 + 标签页图标带红点角标），
  // 直到用户点一下页面任意位置才解除，确保就算错过了闪烁瞬间，回头看一眼也知道有人@过自己
  let windowFlashTimeout = null;
  const ORIGINAL_FAVICON_HREF = faviconEl ? faviconEl.getAttribute('href') : '';
  let alertFaviconDataUrl = null; // 生成一次后缓存，避免每次@都重新绘制

  function buildAlertFaviconAndApply() {
    if (!faviconEl) return;
    if (alertFaviconDataUrl) {
      faviconEl.href = alertFaviconDataUrl;
      return;
    }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      // 右上角画一个醒目的红色圆点角标，模拟"未读提醒"
      const r = size * 0.22;
      const cx = size - r - 2;
      const cy = r + 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ff3b30';
      ctx.fill();
      ctx.lineWidth = size * 0.05;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      alertFaviconDataUrl = canvas.toDataURL('image/png');
      faviconEl.href = alertFaviconDataUrl;
    };
    img.onerror = () => { /* 图标加载失败就放弃，静默降级，不影响其他提醒方式 */ };
    img.src = ORIGINAL_FAVICON_HREF;
  }

  function resetFavicon() {
    if (faviconEl && ORIGINAL_FAVICON_HREF) faviconEl.href = ORIGINAL_FAVICON_HREF;
  }

  function triggerWindowMentionFlash() {
    appEl.classList.remove('window-flashing');
    // 强制重排，确保重新触发闪烁动画（哪怕上一次的还没播完）
    void appEl.offsetWidth;
    appEl.classList.add('window-flashing');
    buildAlertFaviconAndApply();
    // 如果是在桌面客户端（Electron壳）里打开的，额外触发任务栏图标闪烁+红点角标
    if (window.electronAPI && typeof window.electronAPI.notifyMention === 'function') {
      window.electronAPI.notifyMention();
    }
    clearTimeout(windowFlashTimeout);
    windowFlashTimeout = setTimeout(() => {
      appEl.classList.remove('window-flashing');
      appEl.classList.add('window-settled');
    }, 2000); // 4次 × 0.5s ≈ 2s动画时长，播完后转入"定住"状态
  }

  function clearWindowMentionSettled() {
    appEl.classList.remove('window-settled');
    resetFavicon();
  }
  document.addEventListener('click', clearWindowMentionSettled);
  document.addEventListener('keydown', clearWindowMentionSettled);

  function renderOnlineList(users) {
    onlineUsers = users;
    onlineList.innerHTML = '';
    onlineCount.textContent = users.length;
    users.forEach((u) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="dot"></span>${escapeHtml(u)}`;
      onlineList.appendChild(li);
    });
  }

  function setPinnedText(text) {
    currentPinnedText = text || '';
    if (currentPinnedText) {
      pinnedTextEl.textContent = currentPinnedText;
      pinnedTextEl.classList.remove('empty');
    } else {
      pinnedTextEl.textContent = '暂无公告，点击"编辑"设置一条';
      pinnedTextEl.classList.add('empty');
    }
  }

  function autoResizePinnedInput() {
    pinnedInput.style.height = 'auto';
    pinnedInput.style.height = Math.min(pinnedInput.scrollHeight, 100) + 'px';
  }

  function openPinEdit() {
    pinnedInput.value = currentPinnedText;
    pinnedPasswordInput.value = '';
    pinErrorMsg.classList.remove('active');
    pinnedEditRow.classList.add('active');
    pinnedInput.focus();
    autoResizePinnedInput();
  }

  function closePinEdit() {
    pinnedEditRow.classList.remove('active');
    pinnedPasswordInput.value = '';
    pinErrorMsg.classList.remove('active');
    pinErrorMsg.textContent = '';
  }

  function savePinnedText() {
    const text = pinnedInput.value.trim();
    const password = pinnedPasswordInput.value;
    if (!password) {
      pinErrorMsg.textContent = '请输入编辑密码';
      pinErrorMsg.classList.add('active');
      pinnedPasswordInput.focus();
      return;
    }
    pinErrorMsg.classList.remove('active');
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'pin', text, password }));
    }
    // 不在这里直接关闭编辑框——密码对不对由服务器说了算，
    // 保存成功后会收到 'pinned' 广播自动关闭，密码错了会收到 'pin_error' 提示重试
  }

  pinEditOpenBtn.addEventListener('click', openPinEdit);
  pinCancelBtn.addEventListener('click', closePinEdit);
  pinSaveBtn.addEventListener('click', savePinnedText);
  pinnedInput.addEventListener('input', autoResizePinnedInput);
  pinnedInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      savePinnedText();
    }
    if (e.key === 'Escape') closePinEdit();
  });
  pinnedPasswordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') savePinnedText();
    if (e.key === 'Escape') closePinEdit();
  });

  // ===== 常用文本（本地保存，仅自己可见，按关键词自动分类为二级菜单）=====
  const QUICK_CATEGORIES = ['代拍', '代购', '煤炉', '常用语'];

  function categorizePhrase(phrase) {
    for (const cat of QUICK_CATEGORIES) {
      if (cat === '常用语') continue; // 兜底分类放最后判断
      if (phrase.includes(cat)) return cat;
    }
    return '常用语';
  }

  function loadQuickPhrases() {
    try {
      const raw = localStorage.getItem(QUICK_STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    return DEFAULT_QUICK_PHRASES.slice();
  }

  function saveQuickPhrases(list) {
    try {
      localStorage.setItem(QUICK_STORAGE_KEY, JSON.stringify(list));
    } catch (e) { /* ignore（比如隐私模式下localStorage不可用） */ }
  }

  let quickPhrases = loadQuickPhrases();
  // 记住每个分类展开/收起的状态，默认全部收起，点了才展开
  const quickCategoryExpanded = {};
  QUICK_CATEGORIES.forEach((cat) => { quickCategoryExpanded[cat] = false; });

  function insertPhraseToInput(phrase) {
    textInput.value = phrase;
    textInput.focus();
    const len = textInput.value.length;
    textInput.setSelectionRange(len, len);
    autoResizeTextInput();
  }

  function renderQuickList() {
    quickCategoriesEl.innerHTML = '';

    const grouped = {};
    QUICK_CATEGORIES.forEach((cat) => { grouped[cat] = []; });
    quickPhrases.forEach((phrase, index) => {
      const cat = categorizePhrase(phrase);
      grouped[cat].push({ phrase, index });
    });

    QUICK_CATEGORIES.forEach((cat) => {
      const items = grouped[cat];
      const catEl = document.createElement('div');
      catEl.className = 'quick-category' + (quickCategoryExpanded[cat] ? ' expanded' : '');

      const header = document.createElement('button');
      header.className = 'quick-category-header';
      header.innerHTML = `<span>${cat}<span class="quick-category-count">(${items.length})</span></span><span class="quick-category-arrow">▶</span>`;
      header.addEventListener('click', () => {
        quickCategoryExpanded[cat] = !quickCategoryExpanded[cat];
        renderQuickList();
      });
      catEl.appendChild(header);

      const ul = document.createElement('ul');
      ul.className = 'quick-category-list';

      items.forEach(({ phrase, index }) => {
        const li = document.createElement('li');

        const btn = document.createElement('button');
        btn.className = 'quick-text-btn';
        btn.textContent = phrase;
        btn.title = phrase;
        btn.addEventListener('click', () => insertPhraseToInput(phrase));

        const delBtn = document.createElement('button');
        delBtn.className = 'quick-del-btn';
        delBtn.textContent = '×';
        delBtn.title = '删除';
        delBtn.addEventListener('click', () => {
          quickPhrases.splice(index, 1);
          saveQuickPhrases(quickPhrases);
          renderQuickList();
        });

        li.appendChild(btn);
        li.appendChild(delBtn);
        ul.appendChild(li);
      });
      catEl.appendChild(ul);

      const emptyHint = document.createElement('div');
      emptyHint.className = 'quick-category-empty' + (items.length === 0 ? ' active' : '');
      emptyHint.textContent = '暂无内容，点下方"+ 添加常用语"试试';
      catEl.appendChild(emptyHint);

      quickCategoriesEl.appendChild(catEl);
    });
  }

  function openQuickAdd() {
    quickAddRow.classList.add('active');
    quickAddInput.value = '';
    quickAddInput.focus();
  }

  function closeQuickAdd() {
    quickAddRow.classList.remove('active');
  }

  function saveQuickAdd() {
    const text = quickAddInput.value.trim();
    if (text) {
      quickPhrases.push(text);
      saveQuickPhrases(quickPhrases);
      // 新加的内容按关键词自动归到对应分类，顺手展开那个分类方便立刻看到
      quickCategoryExpanded[categorizePhrase(text)] = true;
      renderQuickList();
    }
    closeQuickAdd();
  }

  quickAddBtn.addEventListener('click', openQuickAdd);
  quickCancelBtn.addEventListener('click', closeQuickAdd);
  quickSaveBtn.addEventListener('click', saveQuickAdd);
  quickAddInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveQuickAdd();
    if (e.key === 'Escape') closeQuickAdd();
  });

  renderQuickList();

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function joinChat() {
    const val = usernameInput.value.trim();
    if (!val) { usernameInput.focus(); return; }
    username = val;
    loginEl.style.display = 'none';
    appEl.classList.add('active');
    setPinnedText('');
    myUsernameEl.textContent = username;
    myUsernameEl.title = `当前登录：${username}`;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { /* 部分环境不支持 Web Audio，忽略 */ }
    // 请求系统桌面通知权限：这样即使浏览器窗口被最小化，@所有人/被@时依然能弹出系统级通知
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
    connect();
  }

  function sendMessage() {
    const text = textInput.value.trim();
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    const hasSelectedImage = imagePreviewBar.classList.contains('active');
    if (hasSelectedImage && !pendingImageUrl) {
      // 图片还在上传中，先别发，避免发出一条没有图的消息
      imagePreviewStatus.textContent = '图片还在上传中，请稍等一下再发送...';
      return;
    }
    if (!text && !pendingImageUrl) return; // 文字和图片都没有，没什么可发的

    const payload = { type: 'message', text };
    if (pendingImageUrl) payload.image = pendingImageUrl;
    if (replyingTo) payload.quote = replyingTo;
    ws.send(JSON.stringify(payload));
    textInput.value = '';
    autoResizeTextInput();
    closeMentionMenu();
    cancelReply();
    resetImagePreview();
  }

  // ===== @ 提及自动补全 =====
  let mentionActive = false;
  let mentionStartIndex = -1;
  let mentionCandidates = [];
  let mentionSelectedIndex = 0;

  function updateMentionMenu() {
    const cursor = textInput.selectionStart;
    const value = textInput.value;
    const uptoCursor = value.slice(0, cursor);
    const atIndex = uptoCursor.lastIndexOf('@');

    if (atIndex === -1) { closeMentionMenu(); return; }
    const fragment = uptoCursor.slice(atIndex + 1);
    // 如果 @ 和光标之间出现空格/换行，说明已经不在@输入状态
    if (/\s/.test(fragment)) { closeMentionMenu(); return; }

    const others = onlineUsers.filter((u) => u !== username);
    const candidateSource = ['所有人', ...others];
    const filtered = fragment
      ? candidateSource.filter((u) => u.toLowerCase().includes(fragment.toLowerCase()))
      : candidateSource;

    if (filtered.length === 0) { closeMentionMenu(); return; }

    mentionActive = true;
    mentionStartIndex = atIndex;
    mentionCandidates = filtered;
    mentionSelectedIndex = 0;
    renderMentionMenu();
  }

  function renderMentionMenu() {
    mentionMenu.innerHTML = '';
    mentionCandidates.forEach((name, i) => {
      const item = document.createElement('div');
      item.className = 'mention-item' + (i === mentionSelectedIndex ? ' active' : '');
      const iconHtml = name === '所有人' ? '<span class="mention-all-icon">📢</span>' : '<span class="dot"></span>';
      item.innerHTML = `${iconHtml}${escapeHtml(name)}`;
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectMention(name);
      });
      mentionMenu.appendChild(item);
    });
    mentionMenu.classList.add('active');
  }

  function closeMentionMenu() {
    mentionActive = false;
    mentionStartIndex = -1;
    mentionCandidates = [];
    mentionMenu.classList.remove('active');
    mentionMenu.innerHTML = '';
  }

  function selectMention(name) {
    const value = textInput.value;
    const cursor = textInput.selectionStart;
    const before = value.slice(0, mentionStartIndex);
    const after = value.slice(cursor);
    const insertion = `@${name} `;
    textInput.value = before + insertion + after;
    const newCursor = (before + insertion).length;
    textInput.focus();
    textInput.setSelectionRange(newCursor, newCursor);
    autoResizeTextInput();
    closeMentionMenu();
  }

  function autoResizeTextInput() {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  }

  textInput.addEventListener('input', () => {
    updateMentionMenu();
    autoResizeTextInput();
  });
  textInput.addEventListener('click', updateMentionMenu);

  document.addEventListener('click', (e) => {
    if (!mentionMenu.contains(e.target) && e.target !== textInput) closeMentionMenu();
  });

  joinBtn.addEventListener('click', joinChat);
  usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinChat(); });


  sendBtn.addEventListener('click', sendMessage);
  textInput.addEventListener('keydown', (e) => {
    if (mentionActive) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        mentionSelectedIndex = (mentionSelectedIndex + 1) % mentionCandidates.length;
        renderMentionMenu();
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        mentionSelectedIndex = (mentionSelectedIndex - 1 + mentionCandidates.length) % mentionCandidates.length;
        renderMentionMenu();
        return;
      }
      if (e.key === 'Enter' || e.key === 'Tab') {
        e.preventDefault();
        selectMention(mentionCandidates[mentionSelectedIndex]);
        return;
      }
      if (e.key === 'Escape') {
        closeMentionMenu();
        return;
      }
    }

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); // 防止textarea默认插入一个换行符
      sendMessage();
    } else {
      if (ws && ws.readyState === WebSocket.OPEN) {
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          ws.send(JSON.stringify({ type: 'typing' }));
        }, 200);
      }
    }
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

</script>
</body>
</html>
